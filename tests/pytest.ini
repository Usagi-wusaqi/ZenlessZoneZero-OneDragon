[tool:pytest]
# pytest 配置文件

# 测试发现
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 输出配置
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 标记定义
markers =
    baseline: 基准测试标记
    integration: 集成测试标记
    property_test: 属性基于测试标记
    refactor: 重构相关测试标记
    unit: 单元测试标记
    slow: 慢速测试标记

# 最小版本要求
minversion = 6.0

# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning